[alerts]
desktop = true
telegram = true

[telegram]
token =  tokernapi
chat_id = chatid
commands_enabled = true

[discord]
enabled = false
webhook_url =

[ollama]
enabled = true
host = http://localhost:11434
# Gợi ý model: qwen2.5-coder:7b, llama3.1:8b, mistral:7b
model = qwen2.5-coder:7b
timeout = 60

[thresholds]
brute_force_count = 5
brute_force_window = 300
file_access_cooldown = 300

[security]
# Tự động ban IP qua UFW khi phát hiện brute-force
auto_ban_enabled = true

[detection]
# Port scan: bao nhiêu cổng khác nhau từ 1 IP trong window_sec thì cảnh báo
port_scan_count = 10
port_scan_window = 60
# Distributed brute force: cùng 1 user từ bao nhiêu IP khác nhau
distributed_bf_sources = 3
distributed_bf_window = 300

[whitelist]
# IP tin tưởng, không tạo alert (phân cách bằng dấu phẩy)
ips = 127.0.0.1

[retention]
# Số ngày lưu sự kiện trong DB (events cũ hơn sẽ bị xóa tự động)
days = 30

[scanner]
enabled = true
interval_sec = 300
suspicious_ports = 4444,5555,1337,31337,6666,9999,12345
suspicious_process_keywords = ncat,nmap,masscan,socat,hydra,metasploit,msfconsole,sqlmap

[reports]
daily_enabled = false
daily_at = 08:00
telegram_enabled = true
email_enabled = false

[email]
smtp_host = smtp.gmail.com
smtp_port = 587
use_tls = true
username =
password =
to =

[web]
host = 127.0.0.1
port = 5000
# Bật basic auth cho web dashboard (khuyến nghị khi expose ra mạng)
auth_enabled = true
username = admin
# Mật khẩu mã hoá AES-256-GCM (giống cơ chế token Telegram) — không phải "zusiem" mặc định nữa.
# Đổi mật khẩu: python3 secrets_manager.py encrypt   rồi dán chuỗi enc:... vào đây.
password = 
[log_paths]
auth  = /var/log/auth.log
kern  = /var/log/kern.log
audit = /var/log/audit/audit.log
# Bỏ comment dòng dưới nếu có nginx:
# nginx = /var/log/nginx/access.log

[honeypot]
# Bật honeypot bẫy kẻ tấn công (netsvc.py)
enabled = true
# ⚠️  MÁY CHÍNH: giữ auto_ban = true vì ai kết nối honeypot là rõ ràng scanner
# Nhưng kiểm tra port 80/3306/25 có đang dùng không trước khi bật service
auto_ban = true

[netguard]
# Bật mini-IPS chống flood LAN (netguard.py)
enabled = true
# ⚠️  VPS/SERVER: vẫn để false mặc định vì netguard nhìn theo IP, có thể trùng
# reverse-proxy/CDN đứng trước nhiều client — bật true khi đã whitelist các IP đó.
auto_ban = false
# Ngưỡng cho server: không cần nới lỏng như desktop (không tải torrent/chơi game),
# nên hạ xuống để phát hiện sớm hơn.
conn_threshold = 80
syn_threshold = 40
rate_threshold = 60
hard_threshold = 250

[zucheck]
# Quét bảo mật định kỳ mỗi N giây (zucheck.py)
scan_interval = 3600
